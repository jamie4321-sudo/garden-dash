<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGIT GARDEN · Linkagelab</title>
  <meta name="description" content="AGIT GARDEN — Linkagelab 운영 대시보드" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="layout">
    <!-- ============ SIDEBAR ============ -->
    <aside class="side" id="side">
      <a class="brand" href="#dashboard">
        <span class="brand__row">
          <img class="brand__icon" src="favicon.svg" alt="" />
          <span class="brand__mark">AGIT GARDEN</span>
        </span>
        <span class="brand__sub">Linkagelab</span>
      </a>

      <nav class="nav" id="nav">
        <p class="nav__label">MAIN</p>
        <a class="nav__item" data-view="dashboard" href="#dashboard">대시보드</a>

        <p class="nav__label">CREW</p>
        <a class="nav__item" data-view="crew" href="#crew">크루 로스터</a>
        <a class="nav__item" data-view="plants" href="#plants">식물 상태 점검</a>
        <a class="nav__item" data-view="floors" href="#floors">각층 현황</a>
        <a class="nav__item" data-view="safety" href="#safety">산업안전보건</a>
        <a class="nav__item is-soon">근무 기록</a>
        <a class="nav__item is-soon">출퇴근</a>

        <p class="nav__label">OPERATION</p>
        <a class="nav__item" data-view="schedule" href="#schedule">스케줄</a>
        <a class="nav__item" data-view="sales" href="#sales">매출 리포트</a>
        <a class="nav__item is-soon">정산 관리</a>
        <a class="nav__item is-soon">2026 KPI</a>

        <p class="nav__label">SYSTEM</p>
        <a class="nav__item is-soon">설정</a>
      </nav>

      <div class="side__foot">
        <span class="dot"></span>
        <span>DEMO · v1.0</span>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <div class="main">
      <header class="topbar">
        <p class="topbar__crumb" id="crumb">MAIN / DASHBOARD</p>
        <div class="topbar__right">
          <div class="search">
            <span>⌕</span>
            <input type="text" placeholder="크루 · 매장 검색" />
            <kbd>/</kbd>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button">
            <span class="knob"></span>
            <span id="themeLabel">DARK</span>
          </button>
        </div>
      </header>

      <main id="app"><!-- views injected here --></main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
